<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro ENFERIADOS 2026</title>
  <!-- FullCalendar CSS & JS -->
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  <style>
    :root {
      --accent-yellow: #fdd835; 
      --accent-blue: #00f0ff; 
      --accent-pink: #ff007f;
      --text-main: #ffffff;
      --bg-dark: #121212;
    }
    
    body {
      background: radial-gradient(circle at top right, #2a0845, #121212, #0d021c);
      color: var(--text-main);
      font-family: 'Montserrat', sans-serif; 
      padding: 20px;
      display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; align-items: flex-start; margin: 0;
      min-height: 100vh;
    }

    .panel, .calendar-card {
      background: rgba(30, 30, 30, 0.4);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    .panel {
      padding: 35px; 
      width: 100%; max-width: 450px; 
      border-top: 4px solid var(--accent-pink);
    }
    
    h2 { text-align: center; margin-bottom: 30px; font-size: 1.8em; text-transform: uppercase; letter-spacing: 1px; }
    .enferiados-text {
      background: linear-gradient(90deg, var(--accent-pink), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900; font-style: italic;
    }

    label { display: block; margin-top: 15px; font-size: 0.85em; color: #bbb; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
    
    input, select {
      width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1); 
      background: rgba(0,0,0,0.5); color: white; box-sizing: border-box;
      font-family: 'Montserrat', sans-serif; transition: all 0.3s;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); background: rgba(0,0,0,0.7); }
    
    .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    
    button {
      background: linear-gradient(90deg, #1e88e5, var(--accent-blue));
      color: #000; font-weight: 900; border: none; text-transform: uppercase; letter-spacing: 1px;
      margin-top: 30px; cursor: pointer; transition: 0.3s; padding: 15px; font-size: 1.1em;
      border-radius: 8px; box-shadow: 0 4px 15px rgba(0, 240, 255, 0.4); width: 100%;
    }
    button:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }
    button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 240, 255, 0.6); }
    
    .loader { display: none; text-align: center; margin-top: 20px; color: var(--accent-yellow); font-size: 0.9em; font-weight: bold;}
    .error-msg { display: none; background: rgba(255, 0, 0, 0.1); border: 1px solid #ff4d4d; border-radius: 8px; padding: 10px; color: #ff4d4d; font-size: 0.85em; margin-top: 20px; text-align: center; font-weight: bold; }
    
    /* Contenedor del Calendario */
    .calendar-card { max-width: 600px; width: 100%; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
    #calendar { width: 100%; }
    .fc-theme-standard td, .fc-theme-standard th { border-color: rgba(255,255,255,0.1); }
    .fc .fc-toolbar-title { font-size: 1.2em; color: var(--text-main); font-weight: 700; }
    .fc .fc-button-primary { background-color: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); text-transform: uppercase; font-size: 0.75em; font-weight: bold;}
    .fc .fc-button-primary:hover { background-color: var(--accent-blue); color: #000; }
    .fc .fc-button-primary:not(:disabled).fc-button-active { background-color: var(--accent-blue); color: #000; }
    .fc-list-event:hover td { background-color: rgba(255,255,255,0.05); }
    .fc-list-day-cushion { background-color: rgba(0,0,0,0.3) !important; }
    .fc-col-header-cell-cushion, .fc-list-day-text, .fc-list-day-side-text { color: var(--text-main) !important; text-decoration: none; }
    .fc-daygrid-day-number { color: var(--text-main); text-decoration: none; }

    /* Botón de Exportación */
    .btn-export {
      background: rgba(0, 240, 255, 0.1);
      border: 1px solid var(--accent-blue);
      color: var(--accent-blue);
      font-weight: bold; padding: 12px; border-radius: 8px; cursor: pointer;
      text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 0;
      box-shadow: none;
    }
    .btn-export:hover { background: var(--accent-blue); color: #000; box-shadow: 0 0 15px rgba(0, 240, 255, 0.4); }

    /* Ventana Modal Personalizada */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex; justify-content: center; align-items: center;
      z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-box {
      background: rgba(25, 25, 25, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 35px; width: 100%; max-width: 400px; text-align: center;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
      transform: scale(0.85); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.show .modal-box { transform: scale(1); }
    .modal-icon { font-size: 3em; margin-bottom: 15px; }
    .modal-box h3 { margin: 0 0 10px 0; font-size: 1.4em; text-transform: uppercase; letter-spacing: 1px; }
    .modal-box p { color: #ddd; font-size: 1em; margin-bottom: 30px; line-height: 1.5; }
    .modal-box button {
      background: linear-gradient(90deg, #1e88e5, var(--accent-blue));
      color: #000; font-weight: 900; border: none; padding: 14px 25px;
      border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
      transition: 0.3s; width: 100%; font-size: 1.05em;
      box-shadow: 0 4px 15px rgba(0, 240, 255, 0.4); margin-top: 0;
    }
    .modal-box button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 240, 255, 0.6); }
  </style>
</head>
<body>

  <!-- Ventana Modal -->
  <div id="customModal" class="modal-overlay">
    <div class="modal-box">
      <div id="modalIcon" class="modal-icon"></div>
      <h3 id="modalTitle"></h3>
      <p id="modalMessage"></p>
      <button id="modalBtn" type="button">Aceptar</button>
    </div>
  </div>

  <div class="panel">
    <h2>Registro <span class="enferiados-text">ENFERIADOS</span> 2026</h2>
    <form id="registroForm">
      
      <label>Vendedor</label>
      <input type="text" id="vendedor" required placeholder="Nombre del asesor...">

      <label>Cliente (Clave, Comercial o Fiscal)</label>
      <input list="listaClientes" id="clienteInput" required placeholder="🔍 Escribe para buscar...">
      <datalist id="listaClientes"></datalist>

      <label>Paquete Publicitario (Dinámico)</label>
      <select id="paquete" required>
        <option value="">Cargando paquetes...</option>
      </select>

      <label>Programa Especial</label>
      <select id="programa" required>
        <option value="">Selecciona un programa...</option>
        <option value="Los 40 - Playlist">Los 40 - Playlist (3:00pm - 4:00pm)</option>
        <option value="VOX - Peace and Vox">VOX - Peace and Vox (5:00pm - 8:00pm)</option>
        <option value="Ke Buena - Las Tóxicas">Ke Buena - Las Tóxicas (3:00pm - 7:00pm)</option>
        <option value="Los 40 - Aesthetic">Los 40 - Aesthetic (4:00pm - 6:00pm)</option>
        <option value="Ke Buena - Ke Buen Rollo">Ke Buena - Ke Buen Rollo (1:00pm - 3:00pm)</option>
        <option value="W Radio - Táctica 100.1">W Radio - Táctica 100.1 (3:00pm - 5:00pm)</option>
      </select>

      <!-- FECHA FLEXIBLE: Permite escribir o seleccionar desde una lista desplegable inteligente -->
      <label>Fecha de Activación (aaaa-mm-dd)</label>
      <input type="text" list="listaFechas" id="fecha" required placeholder="Selecciona o escribe aaaa-mm-dd..." disabled>
      <datalist id="listaFechas"></datalist>

      <div class="time-grid">
        <div>
          <label>Hora Inicio</label>
          <select id="horaInicio" required disabled>
            <option value="">--:--</option>
          </select>
        </div>
        <div>
          <label>Hora Fin</label>
          <select id="horaFin" required disabled>
            <option value="">--:--</option>
          </select>
        </div>
      </div>

      <div id="errorMsg" class="error-msg"></div>
      
      <button type="submit" id="btnSubmit" disabled>Confirmar Registro</button>
      <div id="loading" class="loader">Guardando en la base de datos...</div>
    </form>
  </div>

  <!-- Panel Derecho con Múltiples Vistas de Calendario y Exportación -->
  <div class="calendar-card">
    <div id="calendar"></div>
    <button type="button" id="btnExport" class="btn-export">📥 Exportar Listado a CSV</button>
  </div>

  <script>
    // --- IMPORTANTE: PEGA TU URL DE APPS SCRIPT AQUÍ ---
    const API_URL = 'https://script.google.com/macros/s/AKfycbyF7BjEB7FA0Asm3MrQMV-4D41V42GOMqgHgZ95YAodPruJ9ZMewvoolO2cb4UbiA/exec';
    
    let reservasGlobales = [];
    let calendar;

    const reglasProgramas = {
      "Los 40 - Playlist": { min: 15, max: 16, dias: [1, 2, 3, 4, 5] },
      "VOX - Peace and Vox": { min: 17, max: 20, dias: [1, 2, 3, 4, 5] },
      "Ke Buena - Las Tóxicas": { min: 15, max: 19, dias: [1, 2, 3, 4, 5, 6] },
      "Los 40 - Aesthetic": { min: 16, max: 18, dias: [1, 2, 3, 4, 5] },
      "Ke Buena - Ke Buen Rollo": { min: 13, max: 15, dias: [1, 2, 3, 4, 5] },
      "W Radio - Táctica 100.1": { min: 15, max: 17, dias: [1, 2, 3, 4, 5] }
    };

    function mostrarModal(mensaje, tipo, onOk = null) {
      const overlay = document.getElementById('customModal');
      const icon = document.getElementById('modalIcon');
      const title = document.getElementById('modalTitle');
      const msg = document.getElementById('modalMessage');
      const btn = document.getElementById('modalBtn');

      msg.textContent = mensaje;
      
      if (tipo === 'success') {
        icon.innerHTML = '✨';
        title.textContent = '¡Registro Exitoso!';
        title.style.color = 'var(--accent-blue)';
      } else {
        icon.innerHTML = '⚠️';
        title.textContent = 'Aviso de Operación';
        title.style.color = 'var(--accent-pink)';
      }

      overlay.classList.add('show');
      const newBtn = btn.cloneNode(true);
      btn.parentNode.replaceChild(newBtn, btn);

      newBtn.addEventListener('click', () => {
        overlay.classList.remove('show');
        if (onOk) onOk();
      });
    }

    function formatearHora(horaCruda) {
      if (!horaCruda) return "00:00";
      if (horaCruda.includes('T')) {
        const d = new Date(horaCruda);
        return d.toTimeString().substring(0, 5);
      }
      return horaCruda.substring(0, 5);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        initialDate: '2026-08-07',
        headerToolbar: {
          left: 'prev,next',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,listWeek'
        },
        height: 'auto',
        locale: 'es',
        noEventsText: 'No hay activaciones registradas'
      });
      calendar.render();

      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        const datalist = document.getElementById('listaClientes');
        data.clientes.forEach(c => {
          let option = document.createElement('option');
          option.value = `${c.clave} | ${c.comercial} | ${c.fiscal}`;
          datalist.appendChild(option);
        });

        const selectPaquete = document.getElementById('paquete');
        selectPaquete.innerHTML = '<option value="">Selecciona un paquete...</option>';
        data.paquetes.forEach(p => {
          let option = document.createElement('option');
          option.value = p.nombre;
          option.textContent = `${p.nombre} - $${p.precio}`;
          selectPaquete.appendChild(option);
        });

        reservasGlobales = data.reservas.map(r => ({
          ...r,
          horaInicio: formatearHora(r.horaInicio),
          horaFin: formatearHora(r.horaFin)
        }));

        reservasGlobales.forEach(r => {
          calendar.addEvent({
            title: `${r.programa} (${r.cliente.split('|')[1]?.trim() || 'Cliente'})`,
            start: `${r.fecha}T${r.horaInicio}`,
            end: `${r.fecha}T${r.horaFin}`,
            color: '#ff007f'
          });
        });

      } catch (error) {
        console.error("Error cargando API:", error);
      }
    });

    // Poblar dinámicamente las fechas válidas de agosto según el programa seleccionado
    function actualizarFechasDisponibles(programa) {
      const inputFecha = document.getElementById('fecha');
      const datalist = document.getElementById('listaFechas');
      
      datalist.innerHTML = '';
      inputFecha.value = '';

      if (!programa || !reglasProgramas[programa]) {
        inputFecha.disabled = true;
        return;
      }

      inputFecha.disabled = false;
      const reglas = reglasProgramas[programa];

      // Rango oficial: 7 al 30 de agosto de 2026
      let inicio = new Date(2026, 7, 7);
      let fin = new Date(2026, 7, 30);

      let current = new Date(inicio);
      while (current <= fin) {
        let diaSemana = current.getDay(); // 0: Dom, 1: Lun ... 6: Sáb
        if (reglas.dias.includes(diaSemana)) {
          let yyyy = current.getFullYear();
          let mm = String(current.getMonth() + 1).padStart(2, '0');
          let dd = String(current.getDate()).padStart(2, '0');
          let fechaStr = `${yyyy}-${mm}-${dd}`;
          
          let opt = document.createElement('option');
          opt.value = fechaStr;
          datalist.appendChild(opt);
        }
        current.setDate(current.getDate() + 1);
      }
    }

    function actualizarOpcionesDeHora(programa) {
      const hInicio = document.getElementById('horaInicio');
      const hFin = document.getElementById('horaFin');
      
      hInicio.innerHTML = '<option value="">--:--</option>';
      hFin.innerHTML = '<option value="">--:--</option>';

      if (!programa || !reglasProgramas[programa]) {
        hInicio.disabled = true; hFin.disabled = true;
        return;
      }

      hInicio.disabled = false; hFin.disabled = false;
      const limites = reglasProgramas[programa];

      for (let i = limites.min; i <= limites.max; i++) {
        let horaStr = i.toString().padStart(2, '0');
        if (i < limites.max) {
          hInicio.add(new Option(`${horaStr}:00`, `${horaStr}:00`));
          hInicio.add(new Option(`${horaStr}:30`, `${horaStr}:30`));
          hFin.add(new Option(`${horaStr}:00`, `${horaStr}:00`));
          hFin.add(new Option(`${horaStr}:30`, `${horaStr}:30`));
        } else {
          hInicio.add(new Option(`${horaStr}:00`, `${horaStr}:00`));
          hFin.add(new Option(`${horaStr}:00`, `${horaStr}:00`));
        }
      }
    }

    document.getElementById('programa').addEventListener('change', function(e) {
      const prog = e.target.value;
      actualizarFechasDisponibles(prog);
      actualizarOpcionesDeHora(prog);
      evaluarCondicionesGuardado();
    });

    function evaluarCondicionesGuardado() {
      const btn = document.getElementById('btnSubmit');
      const errorMsg = document.getElementById('errorMsg');
      
      const fecha = document.getElementById('fecha').value;
      const hInicio = document.getElementById('horaInicio').value;
      const hFin = document.getElementById('horaFin').value;
      const programa = document.getElementById('programa').value;

      btn.disabled = true;
      errorMsg.style.display = 'none';

      if (!fecha || !programa) return;

      // Validar formato estricto aaaa-mm-dd y rango del evento
      if (!/^\d{4}-\d{2}-\d{2}$/.test(fecha)) return;

      const [y, m, d] = fecha.split('-');
      const fechaObj = new Date(y, m - 1, d);
      const diaSemana = fechaObj.getDay(); 

      if (!reglasProgramas[programa].dias.includes(diaSemana)) {
        let diasNombres = reglasProgramas[programa].dias.length === 6 ? "Lunes a Sábado" : "Lunes a Viernes";
        let nombrePrograma = programa.split('-')[1]?.trim() || programa;
        errorMsg.innerHTML = `⛔ <b>Día Inválido:</b> El programa "${nombrePrograma}" solo opera de ${diasNombres}.`;
        errorMsg.style.display = 'block';
        return;
      }

      if (!hInicio || !hFin) return;

      if (hInicio >= hFin) {
        errorMsg.innerHTML = "⚠️ <b>Horario Inválido:</b> La hora de inicio debe ser menor a la hora de fin.";
        errorMsg.style.display = 'block';
        return;
      }

      const hayColision = reservasGlobales.some(r => {
        if (r.fecha === fecha) {
          return (hInicio < r.horaFin && hFin > r.horaInicio);
        }
        return false;
      });

      if (hayColision) {
        errorMsg.innerHTML = "⛔ <b>BLOQUEADO:</b> El horario seleccionado choca con una activación existente en el calendario.";
        errorMsg.style.display = 'block';
      } else {
        btn.disabled = false;
      }
    }

    document.getElementById('fecha').addEventListener('input', evaluarCondicionesGuardado);
    document.getElementById('fecha').addEventListener('change', evaluarCondicionesGuardado);
    document.getElementById('horaInicio').addEventListener('change', evaluarCondicionesGuardado);
    document.getElementById('horaFin').addEventListener('change', evaluarCondicionesGuardado);

    // Botón de Exportar a CSV
    document.getElementById('btnExport').addEventListener('click', () => {
      if (reservasGlobales.length === 0) {
        mostrarModal('No hay registros disponibles para exportar en este momento.', 'error');
        return;
      }
      let csvContent = "data:text/csv;charset=utf-8,Cliente,Programa,Fecha,Hora Inicio,Hora Fin\n";
      reservasGlobales.forEach(r => {
        csvContent += `"${r.cliente}","${r.programa}","${r.fecha}","${r.horaInicio}","${r.horaFin}"\n`;
      });
      let encodedUri = encodeURI(csvContent);
      let link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", "registros_enferiados_2026.csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    document.getElementById('registroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('btnSubmit');
      const loader = document.getElementById('loading');
      btn.disabled = true; loader.style.display = 'block';

      const datos = {
        vendedor: document.getElementById('vendedor').value,
        clienteStr: document.getElementById('clienteInput').value,
        paquete: document.getElementById('paquete').value,
        programa: document.getElementById('programa').value,
        fecha: document.getElementById('fecha').value,
        horaInicio: document.getElementById('horaInicio').value,
        horaFin: document.getElementById('horaFin').value
      };

      try {
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(datos) });
        mostrarModal('Activación agendada y registrada con éxito en el sistema.', 'success', () => {
          window.location.reload();
        });
      } catch (error) {
        mostrarModal('Error de red al intentar comunicarse con la base de datos.', 'error');
        btn.disabled = false;
      } finally {
        loader.style.display = 'none';
      }
    });
  </script>
</body>
</html>
