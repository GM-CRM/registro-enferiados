<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro ENFERIADOS 2026</title>
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  <style>
    :root {
      --bg-dark: #121212; --card-bg: #1e1e1e;
      --accent-yellow: #fdd835; --accent-blue: #1e88e5; --text-main: #ffffff;
    }
    body {
      background-color: var(--bg-dark); color: var(--text-main);
      font-family: 'Montserrat', sans-serif; padding: 20px;
      display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin: 0;
    }
    .panel {
      background-color: var(--card-bg); padding: 25px; border-radius: 12px;
      width: 100%; max-width: 450px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      border-top: 4px solid var(--accent-yellow);
    }
    
    /* Estilo corporativo para el título */
    h2 { text-align: center; margin-bottom: 25px; font-size: 1.6em; text-transform: uppercase; }
    .enferiados-text {
      background: linear-gradient(90deg, #ff007f, #00f0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 1px;
    }

    label { display: block; margin-top: 12px; font-size: 0.85em; color: #aaa; font-weight: 600; }
    input, select, button {
      width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px;
      border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent-blue); }
    .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    
    button {
      background-color: var(--accent-blue); color: white; font-weight: bold; border: none;
      margin-top: 20px; cursor: pointer; transition: 0.3s; padding: 12px; font-size: 1.05em;
    }
    button:disabled { background-color: #444; color: #777; cursor: not-allowed; }
    button:hover:not(:disabled) { background-color: #1565c0; }
    
    .loader { display: none; text-align: center; margin-top: 15px; color: var(--accent-yellow); font-size: 0.9em; }
    .error-msg { display: none; color: #ff4d4d; font-size: 0.85em; margin-top: 10px; text-align: center; font-weight: bold; }
    
    #calendar { max-width: 500px; width: 100%; background: var(--card-bg); padding: 15px; border-radius: 12px; }
    .fc-theme-standard td, .fc-theme-standard th { border-color: #444; }
    .fc .fc-toolbar-title { font-size: 1.2em; color: var(--text-main); }
    .fc .fc-button-primary { background-color: var(--accent-blue); border-color: var(--accent-blue); }
  </style>
</head>
<body>

  <div class="panel">
    <h2>Registro <span class="enferiados-text">ENFERIADOS</span> 2026</h2>
    <form id="registroForm">
      
      <label>Vendedor</label>
      <input type="text" id="vendedor" required placeholder="Tu nombre...">

      <label>Cliente (Clave, Comercial o Fiscal)</label>
      <input list="listaClientes" id="clienteInput" required placeholder="Buscar coincidencia...">
      <datalist id="listaClientes"></datalist>

      <label>Paquete Publicitario (Dinámico)</label>
      <select id="paquete" required>
        <option value="">Cargando paquetes...</option>
      </select>

      <label>Programa Especial</label>
      <select id="programa" required>
        <option value="">Selecciona un programa...</option>
        <option value="Los 40 - Playlist">Los 40 - Playlist (3:00pm - 4:00pm)</option>
        <option value="VOX - Peace and Vox">VOX - Peace and Vox (5:00pm - 8:00pm)</option>
        <option value="Ke Buena - Las Tóxicas">Ke Buena - Las Tóxicas (3:00pm - 7:00pm)</option>
        <option value="Los 40 - Aesthetic">Los 40 - Aesthetic (4:00pm - 6:00pm)</option>
        <option value="Ke Buena - Ke Buen Rollo">Ke Buena - Ke Buen Rollo (1:00pm - 3:00pm)</option>
        <option value="W Radio - Táctica 100.1">W Radio - Táctica 100.1 (3:00pm - 5:00pm)</option>
      </select>

      <label>Fecha de Activación</label>
      <input type="date" id="fecha" required min="2026-08-07" max="2026-08-30">

      <div class="time-grid">
        <div>
          <label>Hora Inicio</label>
          <input type="time" id="horaInicio" required disabled>
        </div>
        <div>
          <label>Hora Fin</label>
          <input type="time" id="horaFin" required disabled>
        </div>
      </div>

      <div id="errorMsg" class="error-msg"></div>
      
      <button type="submit" id="btnSubmit" disabled>Guardar Registro</button>
      <div id="loading" class="loader">Procesando y validando agenda...</div>
    </form>
  </div>

  <div id="calendar"></div>

  <script>
    // --- IMPORTANTE: PEGA TU URL DE APPS SCRIPT AQUÍ ---
    const API_URL = 'https://script.google.com/macros/s/AKfycbyF7BjEB7FA0Asm3MrQMV-4D41V42GOMqgHgZ95YAodPruJ9ZMewvoolO2cb4UbiA/exec';
    
    let reservasGlobales = [];
    let calendar;

    // Diccionario de reglas operativas
    const reglasProgramas = {
      "Los 40 - Playlist": { min: "15:00", max: "16:00" },
      "VOX - Peace and Vox": { min: "17:00", max: "20:00" },
      "Ke Buena - Las Tóxicas": { min: "15:00", max: "19:00" },
      "Los 40 - Aesthetic": { min: "16:00", max: "18:00" },
      "Ke Buena - Ke Buen Rollo": { min: "13:00", max: "15:00" },
      "W Radio - Táctica 100.1": { min: "15:00", max: "17:00" }
    };

    // Función auxiliar para extraer el formato HH:mm de los datos crudos
    function formatearHora(horaCruda) {
      if (!horaCruda) return "00:00";
      if (horaCruda.includes('T')) {
        const d = new Date(horaCruda);
        return d.toTimeString().substring(0, 5);
      }
      return horaCruda.substring(0, 5);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'listWeek',
        initialDate: '2026-08-07',
        headerToolbar: { left: 'prev,next', center: 'title', right: 'listWeek,timeGridDay' },
        height: 'auto',
        locale: 'es'
      });
      calendar.render();

      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        const datalist = document.getElementById('listaClientes');
        data.clientes.forEach(c => {
          let option = document.createElement('option');
          option.value = `${c.clave} | ${c.comercial} | ${c.fiscal}`;
          datalist.appendChild(option);
        });

        const selectPaquete = document.getElementById('paquete');
        selectPaquete.innerHTML = '<option value="">Selecciona un paquete...</option>';
        data.paquetes.forEach(p => {
          let option = document.createElement('option');
          option.value = p.nombre;
          option.textContent = `${p.nombre} - $${p.precio}`;
          selectPaquete.appendChild(option);
        });

        reservasGlobales = data.reservas.map(r => ({
          ...r,
          horaInicio: formatearHora(r.horaInicio),
          horaFin: formatearHora(r.horaFin)
        }));

        reservasGlobales.forEach(r => {
          calendar.addEvent({
            title: `OCUPADO: ${r.programa}`,
            start: `${r.fecha}T${r.horaInicio}`,
            end: `${r.fecha}T${r.horaFin}`,
            color: '#e53935'
          });
        });

      } catch (error) {
        console.error("Error cargando API:", error);
      }
    });

    // Lógica Matemática: Control del programa y horarios permitidos
    document.getElementById('programa').addEventListener('change', function(e) {
      const programa = e.target.value;
      const hInicio = document.getElementById('horaInicio');
      const hFin = document.getElementById('horaFin');

      if (reglasProgramas[programa]) {
        hInicio.disabled = false;
        hFin.disabled = false;
        hInicio.min = reglasProgramas[programa].min;
        hInicio.max = reglasProgramas[programa].max;
        hFin.min = reglasProgramas[programa].min;
        hFin.max = reglasProgramas[programa].max;
      } else {
        hInicio.disabled = true;
        hFin.disabled = true;
      }
      hInicio.value = "";
      hFin.value = "";
      evaluarCondicionesGuardado();
    });

    // Lógica Matemática: Detección estricta de empalmes
    function evaluarCondicionesGuardado() {
      const btn = document.getElementById('btnSubmit');
      const errorMsg = document.getElementById('errorMsg');
      
      const fecha = document.getElementById('fecha').value;
      const hInicio = document.getElementById('horaInicio').value;
      const hFin = document.getElementById('horaFin').value;
      const programa = document.getElementById('programa').value;

      // Resetear estado
      btn.disabled = true;
      errorMsg.style.display = 'none';

      if (!fecha || !hInicio || !hFin || !programa) return;

      // 1. Validar cronología lógica
      if (hInicio >= hFin) {
        errorMsg.textContent = "Error: La hora de inicio no puede ser mayor o igual a la de fin.";
        errorMsg.style.display = 'block';
        return;
      }

      // 2. Validar reglas del programa seleccionado
      const limites = reglasProgramas[programa];
      if (hInicio < limites.min || hFin > limites.max) {
        errorMsg.textContent = `Error: Horario fuera de rango para este programa (${limites.min} a ${limites.max}).`;
        errorMsg.style.display = 'block';
        return;
      }

      // 3. Evaluar colisiones con la base de datos
      const hayColision = reservasGlobales.some(r => {
        if (r.fecha === fecha) {
          // Fórmula matemática de intersección de rangos
          return (hInicio < r.horaFin && hFin > r.horaInicio);
        }
        return false;
      });

      if (hayColision) {
        errorMsg.textContent = "⛔ BLOQUEADO: Ya existe una activación en este horario exacto.";
        errorMsg.style.display = 'block';
      } else {
        // Si pasa todas las validaciones matemáticas, se libera el botón
        btn.disabled = false;
      }
    }

    // Escuchar cambios para accionar la lógica matemática
    document.getElementById('fecha').addEventListener('change', evaluarCondicionesGuardado);
    document.getElementById('horaInicio').addEventListener('change', evaluarCondicionesGuardado);
    document.getElementById('horaFin').addEventListener('change', evaluarCondicionesGuardado);

    // Enviar Formulario
    document.getElementById('registroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('btnSubmit');
      const loader = document.getElementById('loading');
      btn.disabled = true; loader.style.display = 'block';

      const datos = {
        vendedor: document.getElementById('vendedor').value,
        clienteStr: document.getElementById('clienteInput').value,
        paquete: document.getElementById('paquete').value,
        programa: document.getElementById('programa').value,
        fecha: document.getElementById('fecha').value,
        horaInicio: document.getElementById('horaInicio').value,
        horaFin: document.getElementById('horaFin').value
      };

      try {
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(datos) });
        alert('Registro guardado exitosamente.');
        window.location.reload(); 
      } catch (error) {
        alert('Error de conexión al guardar.');
        btn.disabled = false;
      } finally {
        loader.style.display = 'none';
      }
    });
  </script>
</body>
</html>
