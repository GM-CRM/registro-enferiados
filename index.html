<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro ENFERIADOS 2026</title>
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  <style>
    :root {
      --accent-yellow: #fdd835; 
      --accent-blue: #00f0ff; 
      --accent-pink: #ff007f;
      --text-main: #ffffff;
    }
    
    /* Fondo premium nocturno */
    body {
      background: radial-gradient(circle at top right, #2a0845, #121212, #0d021c);
      color: var(--text-main);
      font-family: 'Montserrat', sans-serif; 
      padding: 20px;
      display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; margin: 0;
      min-height: 100vh;
    }

    /* Efecto Glassmorphism (Cristal) para los paneles */
    .panel, #calendar {
      background: rgba(30, 30, 30, 0.4);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    .panel {
      padding: 35px; 
      width: 100%; max-width: 450px; 
      border-top: 4px solid var(--accent-pink);
    }
    
    /* Tipografía Corporativa */
    h2 { text-align: center; margin-bottom: 30px; font-size: 1.8em; text-transform: uppercase; letter-spacing: 1px; }
    .enferiados-text {
      background: linear-gradient(90deg, var(--accent-pink), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900; font-style: italic;
    }

    label { display: block; margin-top: 15px; font-size: 0.85em; color: #bbb; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
    
    /* Inputs mejorados */
    input, select {
      width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1); 
      background: rgba(0,0,0,0.5); color: white; box-sizing: border-box;
      font-family: 'Montserrat', sans-serif; transition: all 0.3s;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); background: rgba(0,0,0,0.7); }
    
    .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    
    /* Botón con Glow */
    button {
      background: linear-gradient(90deg, #1e88e5, var(--accent-blue));
      color: #000; font-weight: 900; border: none; text-transform: uppercase; letter-spacing: 1px;
      margin-top: 30px; cursor: pointer; transition: 0.3s; padding: 15px; font-size: 1.1em;
      border-radius: 8px; box-shadow: 0 4px 15px rgba(0, 240, 255, 0.4);
    }
    button:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }
    button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 240, 255, 0.6); }
    
    .loader { display: none; text-align: center; margin-top: 20px; color: var(--accent-yellow); font-size: 0.9em; font-weight: bold;}
    .error-msg { display: none; background: rgba(255, 0, 0, 0.1); border: 1px solid #ff4d4d; border-radius: 8px; padding: 10px; color: #ff4d4d; font-size: 0.85em; margin-top: 20px; text-align: center; font-weight: bold; }
    
    /* Calendario adaptado a tema oscuro premium */
    #calendar { max-width: 500px; width: 100%; padding: 25px; }
    .fc-theme-standard td, .fc-theme-standard th { border-color: rgba(255,255,255,0.1); }
    .fc .fc-toolbar-title { font-size: 1.3em; color: var(--text-main); font-weight: 700; }
    .fc .fc-button-primary { background-color: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); text-transform: uppercase; font-size: 0.8em; font-weight: bold;}
    .fc .fc-button-primary:hover { background-color: var(--accent-blue); color: #000; }
    .fc .fc-button-primary:not(:disabled).fc-button-active { background-color: var(--accent-blue); color: #000; }
    .fc-list-event:hover td { background-color: rgba(255,255,255,0.05); }
    .fc-list-day-cushion { background-color: rgba(0,0,0,0.3) !important; }
  </style>
</head>
<body>

  <div class="panel">
    <h2>Registro <span class="enferiados-text">ENFERIADOS</span> 2026</h2>
    <form id="registroForm">
      
      <label>Vendedor</label>
      <input type="text" id="vendedor" required placeholder="Nombre del asesor...">

      <label>Cliente (Clave, Comercial o Fiscal)</label>
      <input list="listaClientes" id="clienteInput" required placeholder="🔍 Escribe para buscar...">
      <datalist id="listaClientes"></datalist>

      <label>Paquete Publicitario (Dinámico)</label>
      <select id="paquete" required>
        <option value="">Cargando paquetes...</option>
      </select>

      <label>Programa Especial</label>
      <select id="programa" required>
        <option value="">Selecciona un programa...</option>
        <option value="Los 40 - Playlist">Los 40 - Playlist (3:00pm - 4:00pm)</option>
        <option value="VOX - Peace and Vox">VOX - Peace and Vox (5:00pm - 8:00pm)</option>
        <option value="Ke Buena - Las Tóxicas">Ke Buena - Las Tóxicas (3:00pm - 7:00pm)</option>
        <option value="Los 40 - Aesthetic">Los 40 - Aesthetic (4:00pm - 6:00pm)</option>
        <option value="Ke Buena - Ke Buen Rollo">Ke Buena - Ke Buen Rollo (1:00pm - 3:00pm)</option>
        <option value="W Radio - Táctica 100.1">W Radio - Táctica 100.1 (3:00pm - 5:00pm)</option>
      </select>

      <label>Fecha de Activación</label>
      <input type="date" id="fecha" required min="2026-08-07" max="2026-08-30">

      <!-- AQUÍ ESTÁ LA SOLUCIÓN: Cambiamos de 'input time' a 'select' para inyectar solo las horas permitidas -->
      <div class="time-grid">
        <div>
          <label>Hora Inicio</label>
          <select id="horaInicio" required disabled>
            <option value="">--:--</option>
          </select>
        </div>
        <div>
          <label>Hora Fin</label>
          <select id="horaFin" required disabled>
            <option value="">--:--</option>
          </select>
        </div>
      </div>

      <div id="errorMsg" class="error-msg"></div>
      
      <button type="submit" id="btnSubmit" disabled>Confirmar Registro</button>
      <div id="loading" class="loader">Validando disponibilidad en el servidor...</div>
    </form>
  </div>

  <div id="calendar"></div>

  <script>
    // --- IMPORTANTE: PEGA TU URL DE APPS SCRIPT AQUÍ ---
    const API_URL = 'https://script.google.com/macros/s/AKfycbyF7BjEB7FA0Asm3MrQMV-4D41V42GOMqgHgZ95YAodPruJ9ZMewvoolO2cb4UbiA/exec';
    
    let reservasGlobales = [];
    let calendar;

    // Diccionario de reglas operativas (formato 24h)
    const reglasProgramas = {
      "Los 40 - Playlist": { min: 15, max: 16 },
      "VOX - Peace and Vox": { min: 17, max: 20 },
      "Ke Buena - Las Tóxicas": { min: 15, max: 19 },
      "Los 40 - Aesthetic": { min: 16, max: 18 },
      "Ke Buena - Ke Buen Rollo": { min: 13, max: 15 },
      "W Radio - Táctica 100.1": { min: 15, max: 17 }
    };

    function formatearHora(horaCruda) {
      if (!horaCruda) return "00:00";
      if (horaCruda.includes('T')) {
        const d = new Date(horaCruda);
        return d.toTimeString().substring(0, 5);
      }
      return horaCruda.substring(0, 5);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'listWeek',
        initialDate: '2026-08-07',
        headerToolbar: { left: 'prev,next', center: 'title', right: 'listWeek,timeGridDay' },
        height: 'auto',
        locale: 'es',
        noEventsText: 'No hay activaciones registradas'
      });
      calendar.render();

      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        const datalist = document.getElementById('listaClientes');
        data.clientes.forEach(c => {
          let option = document.createElement('option');
          option.value = `${c.clave} | ${c.comercial} | ${c.fiscal}`;
          datalist.appendChild(option);
        });

        const selectPaquete = document.getElementById('paquete');
        selectPaquete.innerHTML = '<option value="">Selecciona un paquete...</option>';
        data.paquetes.forEach(p => {
          let option = document.createElement('option');
          option.value = p.nombre;
          option.textContent = `${p.nombre} - $${p.precio}`;
          selectPaquete.appendChild(option);
        });

        reservasGlobales = data.reservas.map(r => ({
          ...r,
          horaInicio: formatearHora(r.horaInicio),
          horaFin: formatearHora(r.horaFin)
        }));

        reservasGlobales.forEach(r => {
          calendar.addEvent({
            title: `OCUPADO: ${r.programa} (${r.cliente.split('|')[1]?.trim() || 'Cliente'})`,
            start: `${r.fecha}T${r.horaInicio}`,
            end: `${r.fecha}T${r.horaFin}`,
            color: '#ff007f'
          });
        });

      } catch (error) {
        console.error("Error cargando API:", error);
      }
    });

    // Lógica para poblar dinámicamente los menús desplegables de hora
    function actualizarOpcionesDeHora(programa) {
      const hInicio = document.getElementById('horaInicio');
      const hFin = document.getElementById('horaFin');
      
      // Limpiar opciones previas
      hInicio.innerHTML = '<option value="">--:--</option>';
      hFin.innerHTML = '<option value="">--:--</option>';

      if (!programa || !reglasProgramas[programa]) {
        hInicio.disabled = true; hFin.disabled = true;
        return;
      }

      hInicio.disabled = false; hFin.disabled = false;
      const limites = reglasProgramas[programa];

      // Inyectar bloques de 30 minutos estrictamente dentro del rango permitido
      for (let i = limites.min; i <= limites.max; i++) {
        let horaStr = i.toString().padStart(2, '0');
        if (i < limites.max) {
          hInicio.add(new Option(`${horaStr}:00`, `${horaStr}:00`));
          hInicio.add(new Option(`${horaStr}:30`, `${horaStr}:30`));
          hFin.add(new Option(`${horaStr}:00`, `${horaStr}:00`));
          hFin.add(new Option(`${horaStr}:30`, `${horaStr}:30`));
        } else {
          // Asegurar que la hora límite máxima esté disponible
          hInicio.add(new Option(`${horaStr}:00`, `${horaStr}:00`));
          hFin.add(new Option(`${horaStr}:00`, `${horaStr}:00`));
        }
      }
    }

    document.getElementById('programa').addEventListener('change', function(e) {
      actualizarOpcionesDeHora(e.target.value);
      evaluarCondicionesGuardado();
    });

    function evaluarCondicionesGuardado() {
      const btn = document.getElementById('btnSubmit');
      const errorMsg = document.getElementById('errorMsg');
      
      const fecha = document.getElementById('fecha').value;
      const hInicio = document.getElementById('horaInicio').value;
      const hFin = document.getElementById('horaFin').value;
      const programa = document.getElementById('programa').value;

      btn.disabled = true;
      errorMsg.style.display = 'none';

      if (!fecha || !hInicio || !hFin || !programa) return;

      if (hInicio >= hFin) {
        errorMsg.innerHTML = "⚠️ <b>Horario Inválido:</b> La hora de inicio debe ser menor a la hora de fin.";
        errorMsg.style.display = 'block';
        return;
      }

      // Evaluar colisiones de empalme
      const hayColision = reservasGlobales.some(r => {
        if (r.fecha === fecha) {
          return (hInicio < r.horaFin && hFin > r.horaInicio);
        }
        return false;
      });

      if (hayColision) {
        errorMsg.innerHTML = "⛔ <b>BLOQUEADO:</b> El horario seleccionado choca con una activación existente en el calendario.";
        errorMsg.style.display = 'block';
      } else {
        btn.disabled = false; // Todo correcto, liberar botón
      }
    }

    document.getElementById('fecha').addEventListener('change', evaluarCondicionesGuardado);
    document.getElementById('horaInicio').addEventListener('change', evaluarCondicionesGuardado);
    document.getElementById('horaFin').addEventListener('change', evaluarCondicionesGuardado);

    document.getElementById('registroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('btnSubmit');
      const loader = document.getElementById('loading');
      btn.disabled = true; loader.style.display = 'block';

      const datos = {
        vendedor: document.getElementById('vendedor').value,
        clienteStr: document.getElementById('clienteInput').value,
        paquete: document.getElementById('paquete').value,
        programa: document.getElementById('programa').value,
        fecha: document.getElementById('fecha').value,
        horaInicio: document.getElementById('horaInicio').value,
        horaFin: document.getElementById('horaFin').value
      };

      try {
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(datos) });
        alert('✅ Activación agendada y registrada con éxito.');
        window.location.reload(); 
      } catch (error) {
        alert('❌ Error de red al intentar comunicarse con Google Sheets.');
        btn.disabled = false;
      } finally {
        loader.style.display = 'none';
      }
    });
  </script>
</body>
</html>
